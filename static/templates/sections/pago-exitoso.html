<div class="animate-hx-fade-in text-white/80">
    <div class="flex items-center justify-center mb-phi-2">
        <div class="w-14 h-14 rounded-full bg-green-400/20 flex items-center justify-center">
            <svg class="w-7 h-7 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
    </div>
    <h2 class="font-heading text-phi-1 font-bold text-white text-center">Pago exitoso</h2>
    <p class="text-white/50 text-sm text-center mt-1">Tu pedido ha sido confirmado</p>

    <div class="mt-phi-2 p-3 rounded-xl bg-white/5 border border-white/10 text-xs space-y-1">
        <div class="flex justify-between">
            <span class="text-white/40">Pedido</span>
            <span class="text-white font-mono">{{ pedido.id_pedido[:8] }}…</span>
        </div>
        {% if pedido.fecha %}
        <div class="flex justify-between">
            <span class="text-white/40">Fecha</span>
            <span class="text-white">{{ pedido.fecha }}</span>
        </div>
        {% endif %}
        <div class="flex justify-between">
            <span class="text-white/40">Estado</span>
            <span class="text-green-400 font-semibold">{{ pedido.estado_label }}</span>
        </div>
        <div class="flex justify-between">
            <span class="text-white/40">Total</span>
            <span class="text-white font-semibold">S/ {{ "%.2f"|format(pedido.total) }}</span>
        </div>
    </div>

    <button hx-get="/mis-pedidos"
            hx-target="#modal-body"
            hx-swap="innerHTML"
            class="w-full mt-phi-2 bg-pastel-pink text-brand-dark font-heading font-semibold text-sm
                   px-4 py-2.5 rounded-full
                   hover:bg-white hover:text-brand-dark transition-all duration-200 active:scale-[0.97]">
        Ver mis pedidos
    </button>
    <button onclick="window.dispatchEvent(new CustomEvent('close-modal'))"
            class="w-full mt-2 text-xs font-heading font-semibold text-pastel-pink hover:text-white transition-colors">
        Seguir comprando
    </button>
</div>
