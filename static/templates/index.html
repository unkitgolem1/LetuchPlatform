{% extends "base.html" %}

{% block title %}LetuchWebSite | Inicio{% endblock %}

{% block content %}

<div id="content-area"
     class="min-h-[50vh] rounded-2xl
            bg-[rgba(29,93,115,0.25)] backdrop-blur-[16px]
            border border-[rgba(200,220,240,0.12)]
            shadow-[0_8px_32px_0_rgba(0,0,0,0.25)]
            p-phi md:p-phi-2"
     hx-get="/section/inicio"
     hx-trigger="load"
     hx-select="#inicio-content"
     hx-target="#content"
     hx-swap="innerHTML">
    <div class="flex items-center justify-center py-phi-5">
        <div class="w-8 h-8 border-4 border-white/20 border-t-pastel-pink
                    rounded-full animate-spin"></div>
    </div>
</div>

{% endblock %}
